name: rfx-issue31-patch-viz
description: "Issue #31: patch antenna S11 + far-field + field animation on NU path"
tags: [rfx, issue-31, patch, viz, gpu]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx
  git fetch --all
  git checkout nu-memory-efficient
  git pull --ff-only origin nu-memory-efficient || true
  pip install -q -e ".[dev]"

  echo "=========================================="
  echo "Issue #31 — patch antenna S11 / FFRP / field animation"
  echo "=========================================="

  # dx=1mm matches 05_patch_antenna reference resolution.
  # num_periods=60 in S11 run, n_steps=3000 in animation path.
  timeout 1800 python scripts/issue31_patch_validation.py \
    --dx-mm 1.0 --frames 16 --n-steps-anim 3000

  echo ""
  echo "=== artifacts ==="
  ls -la docs/research_notes/issue31_figs/

  echo ""
  echo "=== DONE ==="
