name: rfx-physics-gate-port-external-waveguide-broad
description: "Broad-E5 external-reference shard: rectangular_waveguide_port WR90 comparison + readiness"
tags: [rfx, physics-gate, port-external, waveguide-broad, sparameter-validation]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  set -euo pipefail
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx || true
  echo "=== rfx port external-reference shard: rectangular_waveguide_port ==="
  echo "=== expected state ==="
  echo "This shard fails until the broad-E5 external/reference evidence is present and marked broad_e5_passed."
  echo "=== working tree ==="
  git status --short || true
  echo "=== install runtime dependencies (repo path, no editable install) ==="
  python -m pip install -q "scipy>=1.11" "h5py>=3.8" "matplotlib>=3.7"
  export RFX_REPO_ROOT="/root/workspace/byungkwan-workspace/research/rfx"
  export PYTHONPATH="$RFX_REPO_ROOT:${PYTHONPATH:-}"
  python -c "import numpy, rfx; print('dependency_probe=passed', 'numpy', numpy.__version__, 'rfx', getattr(rfx, '__version__', 'unknown'))"
  output_root="${RFX_PORT_EXTERNAL_OUTPUT_ROOT:-.omx/physics-gate/vessl-2026-05-09-port-external}"
  out="$output_root/port_external_waveguide_broad"
  mkdir -p "$out"
  echo "=== dependency audit ==="
  set +e
  python scripts/diagnostics/check_external_solver_dependencies.py \
    --output-dir "$out/dependencies"
  dependency_audit_rc=$?
  set -e
  echo "external_solver_dependency_audit_rc=$dependency_audit_rc"
  echo "=== WR90 cv11 diagnostic run ==="
  set +e
  timeout "${RFX_WAVEGUIDE_WR90_TIMEOUT:-2400}" \
    python validation/crossval/11_waveguide_port_wr90.py \
      > "$out/cv11_waveguide_wr90.stdout.txt" \
      2> "$out/cv11_waveguide_wr90.stderr.txt"
  cv11_rc=$?
  set -e
  echo "$cv11_rc" > "$out/cv11_waveguide_wr90.rc"
  echo "cv11_waveguide_wr90_rc=$cv11_rc"
  if [ "$cv11_rc" -eq 0 ]; then
    echo "=== WR90 external generic comparator ==="
    set +e
    python scripts/diagnostics/build_waveguide_wr90_external_sparameter_comparison.py \
      --cv11-stdout "$out/cv11_waveguide_wr90.stdout.txt" \
      --output-dir "$out/wr90_external_generic_comparison"
    comparison_rc=$?
    set -e
    echo "wr90_external_comparison_rc=$comparison_rc"
    if [ "$comparison_rc" -eq 0 ]; then
      cat "$out/wr90_external_generic_comparison/wr90_external_generic_sparameter_comparison.json"
    fi
  else
    echo "cv11 WR90 run failed or timed out; broad-E5 shard remains blocked"
  fi
  echo "=== broad-E5 readiness report ==="
  set +e
  python scripts/diagnostics/report_port_external_reference_shard.py \
    --family rectangular_waveguide_port \
    --output-dir "$out" \
    --require-complete
  rc=$?
  set -e
  echo "=== shard result ==="
  cat "$out/rectangular_waveguide_port_external_reference_shard.json"
  exit "$rc"
