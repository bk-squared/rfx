name: rfx-issue44-job0-single-gpu-calibration
description: "#44 Phase 4 Job 0 — single-GPU calibration row (sets HBM/wall-time denominators)"
tags: [rfx, issue44, distributed_nu, calibration, gpu]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx
  git pull --ff-only origin main || true
  pip install -q -e ".[dev]"

  echo "========================================"
  echo "rfx Issue #44 Phase 4 Job 0 (single-GPU calibration)"
  echo "========================================"

  mkdir -p logs/issue44
  # Backward without segmented remat OOM'd on 24 GiB HBM (ran 369367233708:
  # `Can't reduce memory use below -59.04GiB ... only reduced to 82.42GiB`).
  # Production workloads use checkpoint_every anyway, so calibrate with a
  # realistic segmented-remat setting instead of none.  V3 Job A sweep
  # includes 50/100/500 as the target checkpoint_every range.
  python scripts/benchmarks/issue44_distributed_nu.py \
    --case calibration --devices 1 --device-type gpu \
    --checkpoint-every 50 \
    --n-steps 200 --out logs/issue44/job0_single_gpu.json

  echo ""
  echo "=== JSON output ==="
  cat logs/issue44/job0_single_gpu.json

  echo ""
  echo "=== DONE ==="
