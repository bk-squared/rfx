name: rfx-issue48-fine-mesh
description: "Patch antenna at dx=0.5mm — check that +9% bias converges toward Balanis"
tags: [rfx, issue-48, fine-mesh, gpu]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx
  git fetch --all
  git checkout main
  git pull --ff-only origin main || true
  pip install -q -e ".[dev]"
  pip install -q plotly

  echo "=== dx=0.5mm (fine mesh) — bias convergence check ==="
  timeout 3600 python scripts/issue31_patch_validation.py \
    --dx-mm 0.5 --skip-anim --skip-3d

  echo "=== DONE ==="
