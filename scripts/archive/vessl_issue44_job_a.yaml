name: rfx-issue44-job-a-2gpu-baseline
description: "#44 Phase 4 Job A - 2-GPU A6000 baseline, checkpoint_every sweep"
tags: [rfx, issue44, distributed_nu, baseline, gpu, a6000]
resources:
  cluster: remilab-c0
  preset: gpu-a6000-2
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx
  git pull --ff-only origin main || true
  pip install -q -e ".[dev]"

  echo "========================================"
  echo "rfx Issue #44 Phase 4 Job A - 2-GPU A6000 baseline"
  echo "========================================"
  nvidia-smi -L || true

  mkdir -p logs/issue44

  # Job A thresholds derived from Job 0 (rtx4090, 6.66M cells, ce=10):
  #   forward_wall_time_pass <= 2.198 s  (= 1.998 * 1.1)
  #   backward_wall_time_pass <= 15.01 s (= 13.64 * 1.1)
  #   peak_mem_per_device_pass <= 1.766 GB (= 1.606 * 1.1)
  # Note: A6000 has 48 GiB HBM (2x RTX 4090), so ce=None / ce=50 also fit.
  # Sweep ce in {10, 25, 50} to find the production-default value.
  # V3 original sweep (None/100/500) is revised per Job 0 OOM evidence.

  for CE in 10 25 50; do
    echo ""
    echo "--- checkpoint_every=${CE} ---"
    python scripts/benchmarks/issue44_distributed_nu.py \
      --case baseline --devices 2 --device-type gpu \
      --checkpoint-every "${CE}" \
      --n-steps 100 \
      --out "logs/issue44/job_a_2gpu_ce${CE}.json" || echo "[WARN] ce=${CE} failed"
  done

  echo ""
  echo "=== JSON outputs ==="
  for CE in 10 25 50; do
    echo "--- ce=${CE} ---"
    cat "logs/issue44/job_a_2gpu_ce${CE}.json" 2>/dev/null || echo "missing"
  done

  echo ""
  echo "=== DONE ==="
