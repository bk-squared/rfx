name: scientific-validation

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # Shard the full "not gpu" suite across parallel jobs. Each shard is a
      # FRESH process running its slice serially, so the cumulative JAX/XLA
      # compilation-cache growth that OOM-killed the single-process full run
      # (~75%, exit 143 on the 7 GB ubuntu-latest runner) cannot accumulate.
      # Serial-per-shard also means no xdist (avoids xdist-only false failures);
      # dropping -x lets every shard report all of its failures.
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run slow suite — shard ${{ matrix.group }} of 4
        run: >
          pytest -q -ra
          -m "not gpu"
          --splits 4 --group ${{ matrix.group }}
          --ignore=tests/test_meep_crossval.py
          --ignore=tests/test_meep_crossval_dielectric_cavity.py
          --ignore=tests/test_openems_crossval.py
          --ignore=tests/test_crossval_comprehensive.py

  # ---------------------------------------------------------------------------
  # Scheduled / manual external-reference crossval lane (roadmap W2.5b).
  #
  # Runs the Meep/analytic crossval scripts against a REAL conda-forge Meep so
  # the rfx-vs-Meep cross-checks are actually exercised (the slow-tests job
  # above deliberately --ignores every Meep crossval test because the CI image
  # has no Meep). This is a SCHEDULED + MANUAL lane only — never a PR gate.
  #
  # NOTE / correction to the roadmap text: the roadmap said "pip-installed
  # Meep", but Meep ships only via conda-forge (pymeep); there is no working
  # pip wheel. This job uses the conda-forge path (setup-miniconda + mamba
  # install -c conda-forge pymeep) instead.
  #
  # Exit-code convention (per script, see examples/crossval/*.py docstrings):
  #   0 -> full PASS incl. external reference        => table row PASS
  #   1 -> rfx self-check failed (real physics/infra) => table row FAIL, job RED
  #   2 -> reference missing, only when declared      => table row SKIP, job green
  # The job fails on timeout, manifest/load errors, exit 1, any unexpected exit,
  # or exit 2 from a script whose manifest contract does not allow it.
  crossval-external:
    # Existing slow-tests stays on the workflow's Monday cron untouched; this
    # lane shares the same schedule + manual dispatch and is gated so adding it
    # does not change any other job's behaviour.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 120  # cv02 ring resonator with real Meep can be slow
    defaults:
      run:
        shell: bash -el {0}  # login shell so the conda env is active per step

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up conda (miniforge + mamba)
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3
        with:
          python-version: "3.11"
          miniforge-version: latest
          use-mamba: true
          activate-environment: rfx-crossval

      - name: Install Meep from conda-forge
        run: mamba install -y -c conda-forge pymeep "numpy>=1.26,<2"

      - name: Install rfx package
        run: pip install -e ".[dev]"

      - name: Run external-reference crossval scripts (per-script exit codes)
        run: |
          set -uo pipefail
          # The job default shell is `bash -el` — the -e (errexit) survives
          # `set -uo pipefail`, so any nonzero script exit killed the step
          # BEFORE the `code=$?` classification below could run. That defeats
          # the whole W2.5 design (exit 2 = visible SKIP, exit 1 = red with
          # a per-script verdict table). Disable errexit explicitly; this
          # loop classifies every exit code itself and sets `fail`.
          set +e
          mkdir -p crossval_logs
          export PYTHONPATH="$PWD"
          export MPLBACKEND=Agg
          export JAX_ENABLE_X64=1

          # The canonical manifest owns scheduled membership and order. cv09/
          # cv10 are pure analytic/internal references but remain in this lane
          # so it also exercises them end to end.
          if ! scheduled_output="$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("examples/crossval/manifest.json").read_text())
          scheduled = sorted(
              (
                  case
                  for case in manifest["cases"]
                  if case["scheduled_external_order"] is not None
              ),
              key=lambda case: case["scheduled_external_order"],
          )
          for case in scheduled:
              allows_exit_2 = int(2 in case["expected_exit_codes"])
              print(f"{Path(case['script']).stem}\t{allows_exit_2}")
          PY
          )"; then
            echo "ERROR: could not load scheduled cases from crossval manifest" >&2
            exit 1
          fi
          if [ -z "$scheduled_output" ]; then
            echo "ERROR: crossval manifest selected no scheduled cases" >&2
            exit 1
          fi
          mapfile -t scheduled_cases <<< "$scheduled_output"

          echo "## rfx external-reference crossval lane" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| script | exit | verdict |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|---------|" >> "$GITHUB_STEP_SUMMARY"

          fail=0
          for scheduled_case in "${scheduled_cases[@]}"; do
            IFS=$'\t' read -r s allows_exit_2 <<< "$scheduled_case"
            if [ -z "$s" ] || { [ "$allows_exit_2" != "0" ] && [ "$allows_exit_2" != "1" ]; }; then
              echo "ERROR: invalid scheduled manifest row: ${scheduled_case}" >&2
              fail=1
              continue
            fi
            log="crossval_logs/${s}.log"
            echo ">>> running ${s} ..."
            # Per-script generous timeout (cv02 with real Meep is the slowest).
            timeout 5400 python "examples/crossval/${s}.py" > "$log" 2>&1
            code=$?
            case $code in
              0) verdict="PASS (full crossval incl. reference)";;
              2)
                if [ "$allows_exit_2" = "1" ]; then
                  verdict="SKIP (reference missing — inconclusive)"
                else
                  verdict="FAIL (exit 2 is not declared for this script)"
                  fail=1
                fi
                ;;
              124) verdict="TIMEOUT"; fail=1;;
              *) verdict="FAIL (rfx self-check / numeric gate)"; fail=1;;
            esac
            echo "    -> exit=${code}  ${verdict}"
            echo "| ${s} | ${code} | ${verdict} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$fail" -ne 0 ]; then
            echo "**Lane result: FAIL** — at least one script failed or timed out." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Lane result: green** (any SKIP rows are inconclusive, not pass)." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$fail"

      - name: Upload per-script crossval logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crossval-external-logs
          path: crossval_logs/
          retention-days: 30
