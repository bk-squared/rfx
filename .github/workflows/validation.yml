name: scientific-validation

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:  # Manual trigger

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run scientific validation tests (slow)
        run: >
          pytest -x -v
          -m slow
          --ignore=tests/test_meep_crossval.py
          --ignore=tests/test_meep_crossval_patch.py
          --ignore=tests/test_openems_crossval.py
          --ignore=tests/test_crossval_comprehensive.py

      - name: Run full test suite (including slow)
        run: >
          pytest -x -q
          --ignore=tests/test_meep_crossval.py
          --ignore=tests/test_meep_crossval_patch.py
          --ignore=tests/test_openems_crossval.py
          --ignore=tests/test_crossval_comprehensive.py
          --ignore=tests/test_subpixel.py
