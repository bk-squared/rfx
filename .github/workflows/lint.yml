name: lint

# Re-enables the ruff lint gate that previously sat dormant in
# .github/workflows/disabled/test.yml. The full CPU/GPU test suite runs on the
# sharded `scientific-validation` workflow (and on VESSL); this workflow is the
# cheap, fast gate that catches undefined names, unused variables, and other
# pyflakes/pycodestyle issues on every push and pull request, so regressions
# don't reach main unreviewed. Selector + ignore list are carried over verbatim
# from the disabled job; production rfx/ and tests/ are clean under it today.

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Lint rfx/ and tests/
        run: ruff check rfx/ tests/ --select E,F,W --ignore E501,F401,E741,E731,E701,E702,E402

  agent-docs-hygiene:
    # docs/agent/ pages are sanitized public exports of internal (gitignored)
    # agent guidance. A public clone does not contain docs/agent-memory/,
    # docs/research_notes/, CLAUDE.md, or .claude/ — so tracked agent-facing
    # pages must never point readers at them.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Forbid gitignored-path references in docs/agent/
        run: |
          hits=$(grep -rn 'research_notes\|agent-memory\|CLAUDE\.md\|\.claude/' docs/agent/ || true)
          if [ -n "$hits" ]; then
            echo "docs/agent/ must not reference gitignored internal paths:"
            echo "$hits"
            exit 1
          fi
          echo "docs/agent/ clean"

      - name: Forbid gitignored-path references in rfx/ and examples/
        # Shipped code (docstrings, comments, runtime message strings) must not
        # point a public-clone reader at gitignored internal paths. A public
        # clone has no docs/agent-memory/, CLAUDE.md, or .claude/. NOTE:
        # research_notes is intentionally excluded from this scan — two
        # examples have legitimate functional research_notes file paths
        # (multilayer_ar_coating optional Meep-reference loader and
        # 13_subgrid_material_validation ARTIFACT_PATH); the docs/agent/ check
        # above still forbids research_notes in exported agent pages.
        run: |
          hits=$(grep -rn 'agent-memory\|CLAUDE\.md\|\.claude/' rfx/ examples/ || true)
          if [ -n "$hits" ]; then
            echo "rfx/ and examples/ must not reference gitignored internal paths:"
            echo "$hits"
            exit 1
          fi
          echo "rfx/ and examples/ clean"
