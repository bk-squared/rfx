name: public-docs-source

on:
  push:
    branches:
      - main
    paths:
      - "docs/public/**"
      - "docs/agent/**"
      - "docs/guides/public_docs_architecture.md"
      - "scripts/check_public_docs_sync.py"
      - "scripts/check_public_docs_manifest.py"
      - "scripts/export_public_docs_to_gitops.py"
      - ".github/workflows/public-docs-source.yml"
  pull_request:
    paths:
      - "docs/public/**"
      - "docs/agent/**"
      - "docs/guides/public_docs_architecture.md"
      - "scripts/check_public_docs_sync.py"
      - "scripts/check_public_docs_manifest.py"
      - "scripts/export_public_docs_to_gitops.py"
      - ".github/workflows/public-docs-source.yml"

jobs:
  public-docs-source:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax-check public-doc scripts
        run: python -m py_compile scripts/check_public_docs_sync.py scripts/check_public_docs_manifest.py scripts/export_public_docs_to_gitops.py

      - name: Verify site map resolves
        run: python scripts/check_public_docs_manifest.py
