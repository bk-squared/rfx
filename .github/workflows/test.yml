# NOTE: pyproject.toml has [project.optional-dependencies].dev (pytest, pytest-xdist)
# but no "test" extra. If you want a dedicated test extra, add to pyproject.toml:
#   test = ["pytest>=7.0", "optax"]
# Until then, this workflow uses .[dev] to get pytest.
name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check rfx/ tests/ --select E,F,W --ignore E501,F401,E741,E731,E701,E702,E402

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (code tests only, gpu tests run on VESSL)
        run: >
          pytest -x -q
          -m "not gpu"
          --ignore=tests/test_meep_crossval.py
          --ignore=tests/test_meep_crossval_patch.py
          --ignore=tests/test_openems_crossval.py
          --ignore=tests/test_crossval_comprehensive.py
