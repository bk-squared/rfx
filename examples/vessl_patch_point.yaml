name: rfx-patch-point-source
description: "Patch antenna with point source (no port loading)"
tags: [rfx, patch-antenna, point-source, diagnostic]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  pip install -q -e .
  python -c "import jax; print(f'Backend: {jax.default_backend()}')"
  python examples/10_patch_point_source.py
