name: rfx-j-source-test
description: "J source (current density) validation: PEC cavity + patch antenna"
tags: [rfx, j-source, validation]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  pip install -q -e .
  python -c "import jax; print(f'Backend: {jax.default_backend()}')"
  python examples/18_j_source_test.py
