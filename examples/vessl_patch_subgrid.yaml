name: rfx-patch-subgrid
description: "Patch antenna with SBP-SAT subgridding (6 substrate cells)"
tags: [rfx, patch-antenna, subgridding, sbp-sat, gpu]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  echo "=== Patch Antenna + SBP-SAT Subgridding ===" && echo "Node:$(hostname)" && echo "Start:$(date)"
  pip install -q -e .
  python -c "import jax; print(f'Backend: {jax.default_backend()}, Devices: {jax.devices()}')"
  python examples/05_patch_antenna_subgrid.py
  echo "=== Done $(date) ==="
