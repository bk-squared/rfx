name: rfx-volume-comp
description: "dx=0.25mm with volume-compensated source + highpass filter"
tags: [rfx, fine-grid, volume-comp]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  pip install -q -e .
  python -c "import jax; print(f'Backend: {jax.default_backend()}')"
  python examples/17_volume_comp.py
